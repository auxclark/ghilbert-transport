services:
  - type: web
    name: ghilbert-transport-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_PASSCODE
        sync: false
      - key: CORS_ORIGIN
        sync: false
